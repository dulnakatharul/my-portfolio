 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lag-Free Smooth Particle Text with Stickman</title>
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0; padding: 0;
            background: radial-gradient(circle at center, #0c1020 0%, #050508 100%);
            overflow: hidden;
            font-family: sans-serif;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            height: 100vh;
        }
        canvas {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }
        .ui-container { 
            position: relative; 
            z-index: 10; 
            margin-top: auto; 
            margin-bottom: 60px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .search-box {
            background: rgba(5, 5, 10, 0.8);
            border: 2px solid #00ffcc; border-radius: 30px;
            padding: 12px 30px; 
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
        }
        .search-box input {
            background: transparent; border: none; color: #fff;
            font-size: 18px; text-align: center; outline: none;
            width: 250px; letter-spacing: 3px; font-weight: bold;
        }
    </style>
</head>
<body>

    <canvas id="particleCanvas"></canvas>

    <div class="ui-container">
        <div class="search-box">
            <input type="text" id="search-input" placeholder="TYPE SUDDDH...">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('particleCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particleArray = [];
        let hue = 0;
        const mouse = { x: canvas.width / 2, y: canvas.height / 2, radius: 90 };

        let jumpOffsetY = 0;
        let jumpVelocity = 0;
        let isJumping = false;
        const gravity = 1.5;

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x; mouse.y = event.y;
        });

        class Particle {
            constructor(x, y) {
                this.x = x; 
                this.y = y;
                this.targetX = x; this.targetY = y;
                this.size = 2.5;
                this.baseHue = Math.random() * 360; 
                this.color = `hsl(${this.baseHue}, 100%, 60%)`;
                this.density = (Math.random() * 12) + 8; // වඩාත් වේගවත් කලා
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.closePath();
                ctx.fill();
            }
            update() {
                let dx = this.targetX - this.x;
                let dy = this.targetY - this.y;
                this.x += dx / this.density;
                this.y += dy / this.density;

                let mdx = mouse.x - this.x;
                let mdy = mouse.y - this.y;
                let distance = Math.sqrt(mdx * mdx + mdy * mdy);
                
                if (distance < mouse.radius) {
                    this.size = 5.5;
                    this.color = `hsl(${hue}, 100%, 70%)`; 
                    let force = (mouse.radius - distance) / mouse.radius;
                    this.x -= mdx * force * 0.2;
                    this.y -= mdy * force * 0.2;
                } else {
                    this.size = 2.5;
                    this.color = `hsl(${this.baseHue + hue}, 100%, 60%)`;
                }
            }
        }

        function drawStickman() {
            const sx = canvas.width / 2;
            const baseSy = canvas.height - 114; 
            
            if (isJumping) {
                jumpVelocity += gravity;
                jumpOffsetY += jumpVelocity;
                if (jumpOffsetY >= 0) {
                    jumpOffsetY = 0;
                    jumpVelocity = 0;
                    isJumping = false;
                }
            }

            const sy = baseSy + jumpOffsetY; 
            const angle = Math.atan2(mouse.y - (sy - 50), mouse.x - sx);

            ctx.lineWidth = 4;
            ctx.strokeStyle = '#00ffcc'; 
            ctx.fillStyle = '#00ffcc';
            ctx.shadowBlur = 12; // Glow එක පොඩ්ඩක් අඩු කලා Lag එක නැති කරන්න
            ctx.shadowColor = '#00ffcc'; 

            ctx.beginPath();
            if (isJumping && jumpVelocity < 0) { 
                ctx.moveTo(sx, sy); ctx.lineTo(sx - 10, sy + 15); ctx.lineTo(sx - 5, sy + 25);
                ctx.moveTo(sx, sy); ctx.lineTo(sx + 10, sy + 15); ctx.lineTo(sx + 5, sy + 25);
            } else { 
                ctx.moveTo(sx, sy); ctx.lineTo(sx - 15, sy - 10); ctx.lineTo(sx - 25, sy + 5);
                ctx.moveTo(sx, sy); ctx.lineTo(sx + 15, sy - 10); ctx.lineTo(sx + 25, sy + 5);
            }
            ctx.stroke();

            ctx.beginPath();
            ctx.moveTo(sx, sy); ctx.lineTo(sx, sy - 45);
            ctx.stroke();

            ctx.beginPath();
            ctx.arc(sx, sy - 60, 15, 0, Math.PI * 2);
            ctx.stroke();

            const eyeXOffset = Math.cos(angle) * 4;
            const eyeYOffset = Math.sin(angle) * 4;
            ctx.beginPath();
            ctx.arc(sx - 5 + eyeXOffset, sy - 61 + eyeYOffset, 2, 0, Math.PI * 2);
            ctx.arc(sx + 5 + eyeXOffset, sy - 61 + eyeYOffset, 2, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.fill();

            ctx.beginPath();
            if (isJumping) {
                ctx.moveTo(sx, sy - 35); ctx.lineTo(sx - 20, sy - 65);
                ctx.moveTo(sx, sy - 35); ctx.lineTo(sx + 20, sy - 65);
            } else {
                ctx.moveTo(sx, sy - 35); ctx.lineTo(sx - 12, sy - 15);
                ctx.moveTo(sx, sy - 35); ctx.lineTo(sx + 12, sy - 15);
            }
            ctx.stroke();

            ctx.shadowBlur = 0;
        }

        function init(text) {
            particleArray = [];
            let fontSize = 200;
            if (text.length > 4) fontSize = 140;
            if (text.length > 8) fontSize = 80;

            ctx.fillStyle = 'white';
            ctx.font = `bold ${fontSize}px sans-serif`;
            
            let textWidth = ctx.measureText(text).width;
            ctx.fillText(text, canvas.width/2 - (textWidth/2), canvas.height/2 - 40);
            
            const textPixels = ctx.getImageData(0, 0, canvas.width, canvas.height);
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // මෙතන y += 5 සහ x += 5 කලා (Lag එක සම්පූර්ණයෙන්ම නැති කරන්න Performance එක වැඩි කලා)
            for (let y = 0; y < textPixels.height; y += 5) {
                for (let x = 0; x < textPixels.width; x += 5) {
                    if (textPixels.data[(y * 4 * textPixels.width) + (x * 4) + 3] > 128) {
                        particleArray.push(new Particle(x, y));
                    }
                }
            }
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 8, 0.25)'; // Trail එක පොඩ්ඩක් වැඩි කලා Smooth වෙන්න
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            hue += 0.5;

            for (let i = 0; i < particleArray.length; i++) {
                particleArray[i].update();
                particleArray[i].draw();
            }

            drawStickman();
            requestAnimationFrame(animate);
        }

        init("AG");
        animate();

        const searchInput = document.getElementById('search-input');
        searchInput.addEventListener('input', function(e){
            init(e.target.value.toUpperCase() || "AG");
            if (!isJumping) {
                isJumping = true;
                jumpVelocity = -16; 
            }
        });

        window.addEventListener('resize', function(){
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            init(searchInput.value || "AG");
        });
    </script>
</body>
</html>
